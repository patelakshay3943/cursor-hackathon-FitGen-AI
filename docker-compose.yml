services:
  postgres:
    image: postgres:16-alpine
    container_name: fitgen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitgen
      POSTGRES_PASSWORD: fitgen
      POSTGRES_DB: fitgen
    ports:
      - "5433:5432"
    volumes:
      - fitgen_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitgen -d fitgen"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fitgen_pg_data:
