# Render Blueprint — FitGen AI
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: Dashboard → New → Blueprint → connect this repo
# Then set CURSOR_API_KEY (and optional ELEVENLABS_*) in the dashboard.

databases:
  - name: fitgen-db
    plan: free
    databaseName: fitgen
    user: fitgen

services:
  - type: web
    name: fitgen-ai
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: NODE_ENV
        value: production
      - key: HUSKY
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: fitgen-db
          property: connectionString
      - key: CURSOR_API_KEY
        sync: false
      - key: CURSOR_MODEL
        value: composer-2.5
      - key: EXERCISE_IMAGE_BASE
        value: https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_MODEL_ID
        sync: false
